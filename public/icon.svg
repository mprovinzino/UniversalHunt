<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Map pin outline -->
  <path d="M256 420c0 0-120-120-120-196a120 120 0 0 1 240 0c0 76-120 196-120 196z"
        fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>
  <!-- Compass star in center -->
  <g transform="translate(256,224)">
    <!-- North pointer -->
    <polygon points="0,-52 14,-10 -14,-10" fill="white"/>
    <!-- South pointer -->
    <polygon points="0,52 14,10 -14,10" fill="rgba(255,255,255,0.5)"/>
    <!-- East pointer -->
    <polygon points="52,0 10,14 10,-14" fill="rgba(255,255,255,0.5)"/>
    <!-- West pointer -->
    <polygon points="-52,0 -10,14 -10,-14" fill="white"/>
    <!-- Center dot -->
    <circle r="8" fill="white"/>
  </g>
</svg>
